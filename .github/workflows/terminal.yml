name: Ubuntu Terminal

on:
  workflow_dispatch:

jobs:
  terminal:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: System info
        run: |
          echo "======== Ubuntu Terminal ========"
          (lsb_release -a 2>/dev/null || cat /etc/os-release)
          echo "CPU cores: $(nproc)"
          free -h
          df -h /
          echo "================================="

      - name: Start tmate terminal
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tmate openssh-client
          # fresh session
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready
          WEB_RW=$(tmate -S /tmp/tmate.sock display -p '#{tmate_web}')
          SSH_RW=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')
          echo "::notice title=WEB::${WEB_RW}"
          echo "::notice title=SSH::${SSH_RW}"
          {
            echo "## Ubuntu Terminal is ready"
            echo ""
            echo "- **Web terminal:** ${WEB_RW}"
            echo "- **SSH:** \`${SSH_RW}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "WEB=${WEB_RW}"
          echo "SSH=${SSH_RW}"
          # keep the runner alive while the session is open (or until timeout)
          while tmate -S /tmp/tmate.sock has-session 2>/dev/null; do
            sleep 15
          done
