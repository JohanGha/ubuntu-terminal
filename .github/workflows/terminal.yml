name: Ubuntu Terminal

on:
  workflow_dispatch:

jobs:
  terminal:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System info
        run: |
          echo "======== Ubuntu Terminal ========"
          (lsb_release -a 2>/dev/null || cat /etc/os-release)
          echo "----"
          echo "CPU cores: $(nproc)"
          echo "Memory:"
          free -h
          echo "Disk:"
          df -h /
          echo "================================="
          echo "Connect using the tmate web/SSH link printed below."

      - name: Start tmate terminal session
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false
